<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.course-section {
  padding: 20px;
}

.section-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 18px;
  border-left: 4px solid #2563eb;
  padding-left: 12px;
}

.course-slider-wrapper {
  position: relative;
}

.course-slider {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
  padding-bottom: 8px;
}

.course-slider::-webkit-scrollbar {
  display: none;
}

.course-card {
  min-width: 280px;
  max-width: 280px;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.course-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  display: block;
}

.course-content {
  padding: 12px;
}

.course-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.35;
  min-height: 44px;
  margin-bottom: 12px;
}

.enroll-btn {
  display: block;
  text-align: center;
  background: #11abc8;
  color: #fff;
  text-decoration: none;
  font-weight: 700;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.course-team {
  font-size: 14px;
  color: #6b7280;
}

.slider-btn {
  position: absolute;
  top: 40%;
  transform: translateY(-50%);
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.15);
  cursor: pointer;
  z-index: 10;
  font-size: 22px;
}

.prev-btn {
  left: -10px;
}

.next-btn {
  right: -10px;
}

@media(max-width:768px) {
  .course-section {
    padding: 16px;
  }

  .section-title {
    font-size: 24px;
  }

  .course-card {
    min-width: 240px;
    max-width: 240px;
  }

  .course-card img {
    height: 135px;
  }

  .slider-btn {
    display: none;
  }
}
</style>
</head>

<body>

<section class="course-section">
  <h2 class="section-title">Online classes of 375+ Exams</h2>

  <div class="course-slider-wrapper">
    <button class="slider-btn prev-btn" onclick="slideCourses(-1)">‹</button>

    <div class="course-slider" id="courseSlider"></div>

    <button class="slider-btn next-btn" onclick="slideCourses(1)">›</button>
  </div>
</section>

<script>
const commonLink =
"https://testbook.com/superpass?utm_source=Website&utm_medium=WebsiteOrganic&utm_campaign=Coaching";

const courses = [
  ["IBPS RRB Clerk (Pre + Mains) Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/5.png.png"],
  ["RRB NTPC Batch 2.0", "//cdn.testbook.com/products/2026/May/6/__w-200-400-600__/(UG).png.png"],
  ["RRB Group D Marathi Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/4/__w-200-400-600__/22.png.png"],
  ["RRB ALP CBT 1: Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/Cat%20Railways%20%282%29.png.png"],
  ["RRB NTPC (UG) Final Shot Batch", "//cdn.testbook.com/products/2026/April/13/__w-200-400-600__/RRB%20NTPC%20%28UG%29%20Final%20Shot%20Batch%20%281%29.png.png"],
  ["RRB Section Controller CBAT (PSYCHOMETRIC TEST): Complete Recorded Batch", "//cdn.testbook.com/products/2026/May/11/__w-200-400-600__/RRB%20Section%20Controller%20CBAT%20%28PSYCHOMETRIC%20TEST%29%20Complete%20Recorded%20Batch.png.png"],
  ["RRB Group D Bangla: Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/RRB%20Group%20D%20Bangla.png.png"],
  ["RRB ALP (CBT 1) Marathi Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/4/__w-200-400-600__/23.png.png"],
  ["SSC CGL: Tier 2 Complete Recorded Batch", "//cdn.testbook.com/products/2026/March/2/__w-200-400-600__/SSC%20CGL%20Tier%202.png.png"],
  ["RRB NTPC: Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/Cat%20Railways.png.png"],
  ["RRB ALP CBT 2: Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/Cat%20Railways%20%283%29.png.png"],
  ["RRB NTPC Bangla: Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/RRB%20NTPC%20Bangla.png.png"],
  ["Quick Prep Batch - RRB NTPC", "//cdn.testbook.com/products/2026/April/17/__w-200-400-600__/5e6189da5f66e94f14a21f52_94.png.png"],
  ["RRB NTPC (CBT 2) Rapid Revision Batch", "//cdn.testbook.com/products/2026/March/28/__w-200-400-600__/RRB%20NTPC%20%28CBT%202%29%20Rapid%20Revision%20Batch.png.png"],
  ["Quick Prep Batch - SSC CGL", "//cdn.testbook.com/products/2026/April/17/__w-200-400-600__/5e6189da5f66e94f14a21f58_100.png.png"],
  ["SSC CGL Prime Batch", "//cdn.testbook.com/products/2026/January/20/__w-200-400-600__/SSC%20CGL%20Prime%20Batch%20%20Recorded%20Course.png.png"],
  ["RRB Clerk Marathi Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/4/__w-200-400-600__/29.png.png"],
  ["IBPS RRB PO (Pre + Mains) Complete Recorded Batch", "//cdn.testbook.com/products/2025/July/3/__w-200-400-600__/6.png.png"]
];

function renderCourses() {
  const slider = document.getElementById("courseSlider");

  slider.innerHTML = courses.map(course => `
    <div class="course-card">
      <img src="${course[1]}" alt="${course[0]}" loading="lazy" />

      <div class="course-content">
        <div class="course-title">${course[0]}</div>

        <a href="${commonLink}" target="_blank" rel="noopener" class="enroll-btn">
          Enroll Now
        </a>

        <div class="course-team">Testbook and Team</div>
      </div>
    </div>
  `).join("");
}

function slideCourses(direction) {
  document.getElementById("courseSlider").scrollBy({
    left: direction * 300,
    behavior: "smooth"
  });
}

renderCourses();
</script>

</body>
</html>
